<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AxisSite Test| Test</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        /* Темы */
        :root { --accent: #10a37f; --bg: #0b0d0e; --card: rgba(23, 23, 23, 0.8); }
        .theme-blue { --accent: #007aff; --bg: #050a0f; }
        .theme-pink { --accent: #ff007a; --bg: #0f050a; }

        body { background: var(--bg); color: #ececf1; font-family: 'Inter', sans-serif; margin: 0; display: flex; height: 100vh; transition: 0.5s; }
        
        /* Стеклянный дизайн */
        .sidebar { width: 260px; background: rgba(0,0,0,0.6); backdrop-filter: blur(10px); border-right: 1px solid rgba(255,255,255,0.1); padding: 20px; display: flex; flex-direction: column; }
        .nav-item { padding: 12px; margin: 4px 0; border-radius: 12px; cursor: pointer; color: #888; display: flex; align-items: center; border: 1px solid transparent; }
        .nav-item.active { background: rgba(255,255,255,0.05); color: var(--accent); border-color: var(--accent); }

        main { flex: 1; overflow-y: auto; padding: 25px; scroll-behavior: smooth; }
        .content-section { display: none; max-width: 1100px; margin: 0 auto; animation: slideUp 0.4s ease; }
        .content-section.active { display: block; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        /* Профиль */
        .channel-banner { width: 100%; height: 200px; border-radius: 20px; background: #222; object-fit: cover; border: 1px solid rgba(255,255,255,0.1); }
        .avatar-box { width: 110px; height: 110px; border-radius: 50%; margin-top: -55px; margin-left: 30px; border: 5px solid var(--bg); background: var(--accent); overflow: hidden; position: relative; }
        .avatar-box img { width: 100%; height: 100%; object-fit: cover; }

        /* Карточки */
        .video-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; margin-top: 20px; }
        .video-card { background: var(--card); border-radius: 18px; border: 1px solid rgba(255,255,255,0.05); overflow: hidden; transition: 0.3s; }
        .video-card:hover { transform: translateY(-5px); border-color: var(--accent); }
        iframe { width: 100%; aspect-ratio: 16/9; border: none; }

        /* Интерфейс настроек */
        .settings-panel { background: #161616; padding: 25px; border-radius: 20px; border: 1px solid #333; margin-bottom: 20px; display: none; }
        .theme-btn { width: 30px; height: 30px; border-radius: 50%; cursor: pointer; border: 2px solid #fff; margin-right: 10px; display: inline-block; }
        input { width: 100%; padding: 12px; background: #000; border: 1px solid #333; color: #fff; border-radius: 10px; margin: 10px 0; }
        .btn { background: var(--accent); color: white; border: none; padding: 12px 20px; border-radius: 10px; cursor: pointer; font-weight: 600; }
    </style>
</head>
<body id="bodyTag">

<div class="sidebar">
    <div style="font-weight:bold; font-size:1.5rem; margin-bottom:30px; color:var(--accent)">AxisSite</div>
    <div class="nav-item active" onclick="showPage('home', this)">📺 Лента</div>
    <div class="nav-item" onclick="showPage('shorts-page', this)">📱 Shorts</div>
    <div class="nav-item" onclick="showPage('my-channel', this)">👤 Мой канал</div>
    <div class="nav-item" onclick="showPage('studio', this)">🎨 Загрузить</div>
    <div class="nav-item" id="modTab" onclick="showPage('mod-page', this)" style="display:none; border-color: gold;">🛡️ Модерация</div>
</div>

<main>
    <section id="home" class="content-section active"><h2>Рекомендации</h2><div class="video-grid" id="videoFeed"></div></section>
    
    <section id="shorts-page" class="content-section"><h2>Короткие видео</h2><div class="video-grid" id="shortsFeed"></div></section>

    <section id="my-channel" class="content-section">
        <img id="uBanner" src="https://images.unsplash.com/photo-1614850523296-d8c1af93d400?q=80" class="channel-banner">
        <div class="avatar-box" id="uAvatarBox">👤</div>
        
        <div style="margin-top:15px; display:flex; justify-content:space-between; align-items:center;">
            <div>
                <h1 id="uNameDisplay" style="margin:0">User</h1>
                <small id="uStats" style="color:var(--accent)">0 видео</small>
            </div>
            <button class="btn" onclick="toggleSets()" style="background:#222">⚙️ Настроить вид</button>
        </div>

        <div id="setsPanel" class="settings-panel">
            <h3>Оформление канала</h3>
            <div style="margin-bottom:15px;">
                <span>Цвет темы: </span>
                <div class="theme-btn" style="background:#10a37f" onclick="setT('')"></div>
                <div class="theme-btn" style="background:#007aff" onclick="setT('theme-blue')"></div>
                <div class="theme-btn" style="background:#ff007a" onclick="setT('theme-pink')"></div>
            </div>
            <input type="text" id="inName" placeholder="Имя канала">
            <input type="text" id="inAva" placeholder="Ссылка на аватарку">
            <input type="text" id="inBan" placeholder="Ссылка на баннер">
            <button class="btn" onclick="saveSets()">Применить</button>
        </div>

        <h3 style="margin-top:40px;">Контент канала</h3>
        <div class="video-grid" id="myVideosFeed"></div>
    </section>

    <section id="studio" class="content-section">
        <h2>Студия Axis</h2>
        <div style="background:#111; padding:25px; border-radius:20px; border:1px solid #333;">
            <input type="text" id="vTitle" placeholder="Как назовем видео?">
            <input type="text" id="vUrl" placeholder="ID видео YouTube (или полная ссылка)">
            <label><input type="checkbox" id="isShort"> Это вертикальный Shorts</label><br><br>
            <button class="btn" onclick="postVid()">Опубликовать на AxisSite</button>
        </div>
    </section>

    <section id="mod-page" class="content-section">
        <h2>Модерация</h2>
        <div id="userModList" style="background:#111; padding:20px; border-radius:20px;"></div>
    </section>
</main>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, onAuthStateChanged, GoogleAuthProvider, signInWithPopup } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getDatabase, ref, onValue, push, update, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDw6J2bx2-K86qeP_fPVbpwE30iZIAU-Gk",
        authDomain: "axistube-31fee.firebaseapp.com",
        databaseURL: "https://axistube-31fee-default-rtdb.firebaseio.com",
        projectId: "axistube-31fee",
        appId: "1:261441549369:web:6ee655221cc0078377c9e8"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);
    const ADMIN_UID = "H9JYbowxIXOdQ7Ef3atMDNXXmxf1";

    window.showPage = (id, el) => {
        document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        el.classList.add('active');
    };

    window.toggleSets = () => {
        const p = document.getElementById('setsPanel');
        p.style.display = (p.style.display === 'block') ? 'none' : 'block';
    };

    window.setT = (t) => {
        document.getElementById('bodyTag').className = t;
        if(auth.currentUser) update(ref(db, `users/${auth.currentUser.uid}`), { theme: t });
    };

    window.saveSets = () => {
        const u = auth.currentUser;
        if(u) {
            update(ref(db, `users/${u.uid}`), {
                name: document.getElementById('inName').value,
                avatar: document.getElementById('inAva').value,
                banner: document.getElementById('inBan').value
            });
            toggleSets();
        }
    };

    onAuthStateChanged(auth, (user) => {
        if (user) {
            if (user.uid === ADMIN_UID) document.getElementById('modTab').style.display = 'flex';
            onValue(ref(db, `users/${user.uid}`), (s) => {
                const d = s.val();
                document.getElementById('uNameDisplay').innerText = d?.name || user.displayName;
                if(d?.avatar) document.getElementById('uAvatarBox').innerHTML = `<img src="${d.avatar}">`;
                if(d?.banner) document.getElementById('uBanner').src = d.banner;
                if(d?.theme) document.getElementById('bodyTag').className = d.theme;
            });
        } else { signInWithPopup(auth, new GoogleAuthProvider()); }
    });

    window.postVid = () => {
        const t = document.getElementById('vTitle').value, u = document.getElementById('vUrl').value, s = document.getElementById('isShort').checked;
        if(t && u) push(ref(db, 'videos'), { title: t, url: u, type: s ? 'short' : 'video', author: document.getElementById('uNameDisplay').innerText, uid: auth.currentUser.uid });
    };

    onValue(ref(db, 'videos'), (snap) => {
        const feeds = { h: '', s: '', m: '' };
        let myCount = 0;
        snap.forEach(c => {
            const v = c.val();
            const id = v.url.includes('v=') ? v.url.split('v=')[1] : v.url.split('/').pop();
            const canDel = (auth.currentUser?.uid === ADMIN_UID || auth.currentUser?.uid === v.uid);
            const card = `<div class="video-card">
                <iframe src="https://www.youtube.com/embed/${id}"></iframe>
                <div style="padding:12px"><b>${v.title}</b><br><small style="opacity:0.6">${v.author}</small>
                ${canDel ? `<br><button class="btn" style="padding:5px 10px; font-size:0.7rem; margin-top:10px; background:#ff4444" onclick='remove(ref(db, "videos/${c.key}"))'>Удалить</button>` : ''}
                </div></div>`;
            if (v.type === 'short') feeds.s += card; else feeds.h += card;
            if (v.uid === auth.currentUser?.uid) { feeds.m += card; myCount++; }
        });
        document.getElementById('videoFeed').innerHTML = feeds.h;
        document.getElementById('shortsFeed').innerHTML = feeds.s;
        document.getElementById('myVideosFeed').innerHTML = feeds.m;
        document.getElementById('uStats').innerText = `${myCount} видео`;
    });
</script>
</body>
</html>
