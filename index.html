<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Axis Platform | v3.5</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --oa-green: #10a37f; --oa-bg: #0b0d0e; --sidebar: #000000; --card: #171717; --glass: rgba(255, 255, 255, 0.05); --text: #ececf1; }
        .light-theme { --oa-bg: #f7f7f8; --sidebar: #ffffff; --card: #ffffff; --text: #212121; --glass: rgba(0,0,0,0.05); }
        
        * { box-sizing: border-box; transition: all 0.3s ease; }
        body { background: var(--oa-bg); color: var(--text); font-family: 'Inter', sans-serif; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        /* Sidebar */
        .sidebar { width: 260px; background: var(--sidebar); border-right: 1px solid rgba(128,128,128,0.2); display: flex; flex-direction: column; padding: 20px; }
        .logo { font-weight: 600; color: var(--oa-green); margin-bottom: 40px; font-size: 1.3rem; letter-spacing: 1px; display: flex; align-items: center; }
        .nav-item { padding: 12px 15px; margin: 5px 0; border-radius: 12px; cursor: pointer; display: flex; align-items: center; font-size: 0.95rem; color: #8e8ea0; }
        .nav-item:hover { background: var(--glass); color: var(--text); }
        .nav-item.active { background: var(--oa-green); color: white; box-shadow: 0 4px 15px rgba(16, 163, 127, 0.3); }

        /* Content Area */
        main { flex: 1; overflow-y: auto; padding: 40px; }
        .page { display: none; max-width: 1000px; margin: 0 auto; animation: fadeIn 0.4s ease; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Account & Settings */
        .profile-header { display: flex; align-items: center; gap: 20px; margin-bottom: 40px; padding: 20px; background: var(--glass); border-radius: 20px; }
        .avatar { width: 80px; height: 80px; border-radius: 50%; border: 3px solid var(--oa-green); object-fit: cover; }
        .settings-group { background: var(--card); border: 1px solid rgba(128,128,128,0.2); border-radius: 15px; padding: 10px; margin-bottom: 20px; }
        .settings-item { display: flex; justify-content: space-between; align-items: center; padding: 15px; border-bottom: 1px solid rgba(128,128,128,0.1); }
        .settings-item:last-child { border-bottom: none; }
        
        /* Interactive Elements */
        .switch { position: relative; display: inline-block; width: 44px; height: 24px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #333; border-radius: 34px; }
        .slider:before { position: absolute; content: ""; height: 18px; width: 18px; left: 3px; bottom: 3px; background-color: white; border-radius: 50%; }
        input:checked + .slider { background-color: var(--oa-green); }
        input:checked + .slider:before { transform: translateX(20px); }

        .btn-red { background: #ea4335; color: white; border: none; padding: 12px; border-radius: 10px; width: 100%; cursor: pointer; font-weight: 600; margin-top: 20px; }
        
        /* Grids */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
        .video-card { background: var(--card); border-radius: 15px; border: 1px solid rgba(128,128,128,0.2); overflow: hidden; }
        .video-container { width: 100%; aspect-ratio: 16/9; background: #000; }
        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="logo">AXIS PROJECT</div>
    <div class="nav-item active" onclick="showPage('tube', this)">📺 AxisTube</div>
    <div class="nav-item" onclick="showPage('shorts', this)">📱 Shorts</div>
    <div class="nav-item" onclick="showPage('studio', this)">🎨 Studio</div>
    <div class="nav-item" onclick="showPage('acc', this)">⚙️ Account</div>
</div>

<main>
    <section id="page-tube" class="page active">
        <h2>AxisTube</h2>
        <div class="grid" id="tubeFeed"></div>
    </section>

    <section id="page-shorts" class="page">
        <h2>Shorts</h2>
        <div class="grid" id="shortsFeed" style="grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));"></div>
    </section>

    <section id="page-studio" class="page">
        <h2>Creator Studio</h2>
        <div class="settings-group" style="padding:20px">
            <input type="text" id="vTitle" placeholder="Название видео..." style="width:100%; padding:12px; margin-bottom:10px; border-radius:8px; border:1px solid #444; background:#000; color:white;">
            <input type="text" id="vUrl" placeholder="Ссылка на YouTube..." style="width:100%; padding:12px; margin-bottom:10px; border-radius:8px; border:1px solid #444; background:#000; color:white;">
            <select id="vType" style="width:100%; padding:12px; margin-bottom:15px; border-radius:8px; background:#000; color:white;">
                <option value="tube">Обычное видео</option>
                <option value="short">Shorts</option>
            </select>
            <button onclick="postVideo()" style="width:100%; padding:15px; background:var(--oa-green); border:none; color:white; border-radius:10px; font-weight:600; cursor:pointer;">Опубликовать контент</button>
        </div>
    </section>

    <section id="page-acc" class="page">
        <h2>Настройки профиля</h2>
        <div id="authContent">
            <div class="profile-header">
                <img src="" id="userAvatar" class="avatar" alt="Avatar">
                <div>
                    <h3 id="userNameDisplay" style="margin:0">Загрузка...</h3>
                    <small style="color:var(--oa-green)">Verified Creator</small>
                </div>
            </div>

            <div class="settings-group">
                <div class="settings-item">
                    <span>Тёмная тема</span>
                    <label class="switch"><input type="checkbox" checked onchange="toggleTheme()"><span class="slider"></span></label>
                </div>
                <div class="settings-item">
                    <span>Уведомления о новых видео</span>
                    <label class="switch"><input type="checkbox" checked><span class="slider"></span></label>
                </div>
                <div class="settings-item" style="cursor:pointer">
                    <span>Изменить имя профиля</span>
                    <span style="color:#8e8ea0">></span>
                </div>
            </div>

            <button class="btn-red" onclick="logout()">Выйти из аккаунта</button>
        </div>
        <div id="noAuth" style="display:none; text-align:center; padding-top:50px;">
            <button onclick="login()" style="padding:15px 30px; background:var(--oa-green); border:none; color:white; border-radius:10px; font-weight:600; cursor:pointer;">Войти через Google</button>
        </div>
    </section>
</main>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getDatabase, ref, push, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDw6J2bx2-K86qeP_fPVbpwE30iZIAU-Gk",
        authDomain: "axistube-31fee.firebaseapp.com",
        databaseURL: "https://axistube-31fee-default-rtdb.firebaseio.com",
        projectId: "axistube-31fee",
        appId: "1:261441549369:web:6ee655221cc0078377c9e8"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);
    const provider = new GoogleAuthProvider();

    window.showPage = (id, el) => {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
        document.getElementById('page-'+id).classList.add('active');
        el.classList.add('active');
    };

    window.login = () => signInWithPopup(auth, provider);
    window.logout = () => signOut(auth);
    window.toggleTheme = () => document.body.classList.toggle('light-theme');

    onAuthStateChanged(auth, (user) => {
        if (user) {
            document.getElementById('authContent').style.display = 'block';
            document.getElementById('noAuth').style.display = 'none';
            document.getElementById('userNameDisplay').innerText = user.displayName;
            document.getElementById('userAvatar').src = user.photoURL;
        } else {
            document.getElementById('authContent').style.display = 'none';
            document.getElementById('noAuth').style.display = 'block';
        }
    });

    window.postVideo = () => {
        const title = document.getElementById('vTitle').value;
        const url = document.getElementById('vUrl').value;
        const type = document.getElementById('vType').value;
        if(title && url) {
            push(ref(db, 'content'), { title, url, type, author: auth.currentUser.displayName });
            alert("Опубликовано!");
        }
    };

    onValue(ref(db, 'content'), (snap) => {
        const tube = document.getElementById('tubeFeed'), shorts = document.getElementById('shortsFeed');
        tube.innerHTML = ''; shorts.innerHTML = '';
        snap.forEach(child => {
            const v = child.val();
            const id = v.url.includes('youtu.be') ? v.url.split('/').pop() : new URLSearchParams(new URL(v.url).search).get('v');
            const html = `<div class="video-card"><div class="video-container" style="${v.type==='short'?'aspect-ratio:9/16':''}"><iframe src="https://www.youtube.com/embed/${id}"></iframe></div><div style="padding:15px"><b>${v.title}</b><br><small>${v.author}</small></div></div>`;
            if(v.type==='short') shorts.innerHTML += html; else tube.innerHTML += html;
        });
    });
</script>
</body>
</html>
