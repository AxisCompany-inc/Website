<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Axis Studio | Justice Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --oa-green: #10a37f; --oa-bg: #0b0d0e; --card: #171717; }
        body { background: var(--oa-bg); color: #ececf1; font-family: 'Inter', sans-serif; margin: 0; display: flex; height: 100vh; }
        
        .sidebar { width: 260px; background: #000; border-right: 1px solid #333; padding: 20px; display: flex; flex-direction: column; }
        .nav-item { padding: 12px; margin: 4px 0; border-radius: 10px; cursor: pointer; color: #888; display: flex; align-items: center; }
        .nav-item.active { background: #212121; color: #fff; border: 1px solid #444; }
        #adminTab { border: 1px dashed gold; color: gold; margin-top: 20px; display: none; }

        main { flex: 1; overflow-y: auto; padding: 25px; }
        .content-section { display: none; animation: fadeIn 0.3s; }
        .content-section.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .video-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
        .video-card { background: var(--card); border-radius: 15px; border: 1px solid #333; overflow: hidden; }
        iframe { width: 100%; aspect-ratio: 16/9; border: none; }

        .admin-panel { background: #111; border: 1px solid gold; padding: 20px; border-radius: 15px; }
        .strike-badge { background: red; color: white; padding: 2px 8px; border-radius: 5px; font-size: 12px; }
        .btn { padding: 8px 15px; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; margin: 5px; }
        .btn-strike { background: #ff9800; color: black; }
        .btn-restore { background: #4caf50; color: white; }
        .btn-ban { background: #f44336; color: white; }
    </style>
</head>
<body>

<div class="sidebar">
    <div style="color: var(--oa-green); font-weight: bold; margin-bottom: 30px;">AXIS PROJECT</div>
    <div class="nav-item active" onclick="showPage('home', this)">📺 Лента</div>
    <div class="nav-item" onclick="showPage('shorts-page', this)">📱 Shorts</div>
    <div class="nav-item" onclick="showPage('studio', this)">🎨 Загрузить</div>
    <div class="nav-item" id="adminTab" onclick="showPage('admin-page', this)">🛡️ Модерация</div>
</div>

<main>
    <section id="home" class="content-section active">
        <h2>Актуальное</h2>
        <div class="video-grid" id="videoFeed"></div>
    </section>

    <section id="shorts-page" class="content-section">
        <h2>Shorts</h2>
        <div class="video-grid" id="shortsFeed" style="grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));"></div>
    </section>

    <section id="admin-page" class="content-section">
        <div class="admin-panel">
            <h2>Панель Батьки</h2>
            
            <h3>Пользователи и Страйки</h3>
            <div id="adminUsers"></div>

            <h3 style="margin-top:40px;">Удалённые видео (Корзина)</h3>
            <div id="deletedVideos" class="video-grid"></div>
        </div>
    </section>
</main>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, onAuthStateChanged, GoogleAuthProvider, signInWithPopup } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getDatabase, ref, onValue, update, push, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDw6J2bx2-K86qeP_fPVbpwE30iZIAU-Gk",
        authDomain: "axistube-31fee.firebaseapp.com",
        databaseURL: "https://axistube-31fee-default-rtdb.firebaseio.com",
        projectId: "axistube-31fee",
        appId: "1:261441549369:web:6ee655221cc0078377c9e8"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);
    const BOSS_UID = "H9JYbowxIXOdQ7Ef3atMDNXXmxf1"; // Твой UID

    window.showPage = (id, el) => {
        document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        el.classList.add('active');
    };

    onAuthStateChanged(auth, (user) => {
        if (user) {
            if (user.uid === BOSS_UID) document.getElementById('adminTab').style.display = 'flex';
            
            // Авто-бан при 3 страйках
            onValue(ref(db, `users/${user.uid}`), (s) => {
                const data = s.val();
                if (data?.strikes >= 3 || data?.isBanned) {
                    alert("Допрыгался! Твой аккаунт заблокирован.");
                    auth.signOut();
                    location.reload();
                }
            });
            update(ref(db, `users/${user.uid}`), { name: user.displayName, uid: user.uid });
        } else {
            signInWithPopup(auth, new GoogleAuthProvider());
        }
    });

    // --- МОДЕРАЦИЯ ВИДЕО ---
    window.softDelete = (id, data) => {
        if(confirm("Удалить в корзину?")) {
            update(ref(db, `deleted_content/${id}`), data); // Переносим в корзину
            remove(ref(db, `videos/${id}`)); // Удаляем из основной ленты
        }
    };

    window.restoreVideo = (id, data) => {
        update(ref(db, `videos/${id}`), data);
        remove(ref(db, `deleted_content/${id}`));
    };

    // --- СИСТЕМА СТРАЙКОВ ---
    window.addStrike = (uid, currentStrikes = 0) => {
        update(ref(db, `users/${uid}`), { strikes: currentStrikes + 1 });
    };

    window.removeBan = (uid) => {
        update(ref(db, `users/${uid}`), { strikes: 0, isBanned: false });
        alert("Пользователь помилован!");
    };

    // --- РЕНДЕРИНГ ---
    onValue(ref(db, 'videos'), (s) => {
        const feed = document.getElementById('videoFeed');
        feed.innerHTML = '';
        s.forEach(child => {
            const v = child.val();
            const isAdmin = auth.currentUser?.uid === BOSS_UID;
            feed.innerHTML += `
                <div class="video-card">
                    <iframe src="https://www.youtube.com/embed/${v.url.split('v=')[1]}"></iframe>
                    <div style="padding:10px">
                        <b>${v.title}</b><br>
                        ${isAdmin ? `<button class="btn btn-ban" onclick='softDelete("${child.key}", ${JSON.stringify(v)})'>Удалить</button>` : ''}
                    </div>
                </div>`;
        });
    });

    onValue(ref(db, 'deleted_content'), (s) => {
        const delFeed = document.getElementById('deletedVideos');
        delFeed.innerHTML = '';
        s.forEach(child => {
            const v = child.val();
            delFeed.innerHTML += `
                <div class="video-card">
                    <div style="padding:10px">
                        <b>${v.title}</b><br>
                        <button class="btn btn-restore" onclick='restoreVideo("${child.key}", ${JSON.stringify(v)})'>ВЕРНУТЬ ВИДЕО</button>
                    </div>
                </div>`;
        });
    });

    onValue(ref(db, 'users'), (s) => {
        const adminUsers = document.getElementById('adminUsers');
        adminUsers.innerHTML = '';
        s.forEach(child => {
            const u = child.val();
            if(u.uid === BOSS_UID) return;
            adminUsers.innerHTML += `
                <div style="padding:10px; border-bottom:1px solid #222;">
                    ${u.name} <span class="strike-badge">Страйки: ${u.strikes || 0}</span>
                    <button class="btn btn-strike" onclick="addStrike('${u.uid}', ${u.strikes || 0})">+1 Страйк</button>
                    <button class="btn btn-restore" onclick="removeBan('${u.uid}')">Разбанить / Обнулить</button>
                </div>`;
        });
    });

</script>
</body>
</html>
