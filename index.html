<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AxisSite | Final Header Fix</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #10a37f; --bg: #0b0d0e; --card: #171717; }
        body { background: var(--bg); color: #ececf1; font-family: 'Inter', sans-serif; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        /* Sidebar */
        .sidebar { width: 260px; background: #000; border-right: 1px solid #333; padding: 20px; display: flex; flex-direction: column; flex-shrink: 0; }
        .nav-item { padding: 12px; margin: 4px 0; border-radius: 10px; cursor: pointer; color: #888; display: flex; align-items: center; }
        .nav-item.active { background: #212121; color: var(--accent); border: 1px solid #333; }

        main { flex: 1; overflow-y: auto; padding: 20px; position: relative; }
        
        /* Дизайн шапки канала */
        .header-container { width: 100%; position: relative; margin-bottom: 40px; }
        .banner { 
            width: 100%; height: 200px; border-radius: 20px; 
            object-fit: cover; background: #222; border: 1px solid #333;
        }
        .profile-bar { display: flex; align-items: center; gap: 20px; padding: 0 30px; margin-top: -50px; }
        .avatar { 
            width: 110px; height: 110px; border-radius: 50%; 
            border: 6px solid var(--bg); background: var(--accent);
            overflow: hidden; display: flex; align-items: center; justify-content: center; font-size: 2.5rem;
        }
        .avatar img { width: 100%; height: 100%; object-fit: cover; }

        .btn-settings { 
            position: absolute; top: 15px; right: 15px; 
            background: rgba(0,0,0,0.7); color: #fff; border: 1px solid #444;
            padding: 10px 15px; border-radius: 10px; cursor: pointer; backdrop-filter: blur(5px);
        }

        /* Форма настроек */
        .settings-modal { 
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: #161616; padding: 30px; border-radius: 24px; border: 1px solid #333; z-index: 1000; width: 90%; max-width: 450px; box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }
        .settings-modal input { width: 100%; padding: 12px; margin: 10px 0; background: #000; border: 1px solid #333; color: #fff; border-radius: 10px; box-sizing: border-box; }
        
        .btn-primary { background: var(--accent); color: #fff; border: none; padding: 12px; border-radius: 10px; cursor: pointer; font-weight: 600; width: 100%; margin-top: 15px; }

        .content-section { display: none; }
        .content-section.active { display: block; }

        /* Сетка видео */
        .video-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; margin-top: 20px; }
        .v-card { background: var(--card); border-radius: 15px; border: 1px solid #333; overflow: hidden; }
        iframe { width: 100%; aspect-ratio: 16/9; border: none; }
    </style>
</head>
<body>

<div class="sidebar">
    <div style="font-weight:bold; font-size:1.5rem; margin-bottom:30px; color:var(--accent)">AxisSite</div>
    <div class="nav-item active" onclick="showPage('home', this)">📺 Лента</div>
    <div class="nav-item" id="nav-chan" onclick="showPage('my-channel', this)">👤 Мой канал</div>
    <div class="nav-item" onclick="showPage('studio', this)">🎨 Загрузить</div>
</div>

<main>
    <section id="home" class="content-section active">
        <h2>Актуальное</h2>
        <div class="video-grid" id="mainFeed"></div>
    </section>

    <section id="my-channel" class="content-section">
        <div class="header-container">
            <img id="chanBanner" src="https://images.unsplash.com/photo-1614850523296-d8c1af93d400?q=80" class="banner">
            <button class="btn-settings" onclick="toggleSettings()">⚙️ Настроить шапку</button>
            <div class="profile-bar">
                <div class="avatar" id="chanAva">👤</div>
                <div>
                    <h1 id="chanName" style="margin:0">Загрузка...</h1>
                    <small id="chanSubs" style="color:var(--accent)">0 подписчиков</small>
                </div>
            </div>
        </div>
        <h3>Ваши видео</h3>
        <div class="video-grid" id="myFeed"></div>

        <div id="modal" class="settings-modal">
            <h3 style="margin-top:0">Оформление Axis-канала</h3>
            <p style="font-size: 0.8rem; color: #888;">Вставьте ссылки на изображения из интернета</p>
            <input type="text" id="newName" placeholder="Имя пользователя">
            <input type="text" id="newAva" placeholder="URL аватарки (квадратная)">
            <input type="text" id="newBanner" placeholder="URL шапки (панорамная)">
            <button class="btn-primary" onclick="saveData()">Применить изменения</button>
            <button onclick="toggleSettings()" style="background:none; border:none; color:#555; width:100%; margin-top:10px; cursor:pointer;">Отмена</button>
        </div>
    </section>

    <section id="studio" class="content-section">
        <div style="max-width:500px; background:#111; padding:30px; border-radius:20px;">
            <h3>Новая публикация</h3>
            <input type="text" id="vTitle" placeholder="Заголовок..." style="width:100%; padding:10px; margin-bottom:10px; background:#000; color:#fff; border:1px solid #333;">
            <input type="text" id="vUrl" placeholder="ID видео YouTube..." style="width:100%; padding:10px; margin-bottom:10px; background:#000; color:#fff; border:1px solid #333;">
            <button class="btn-primary" onclick="uploadVideo()">Опубликовать</button>
        </div>
    </section>
</main>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, onAuthStateChanged, GoogleAuthProvider, signInWithPopup } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getDatabase, ref, onValue, push, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDw6J2bx2-K86qeP_fPVbpwE30iZIAU-Gk",
        authDomain: "axistube-31fee.firebaseapp.com",
        databaseURL: "https://axistube-31fee-default-rtdb.firebaseio.com",
        projectId: "axistube-31fee",
        appId: "1:261441549369:web:6ee655221cc0078377c9e8"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);

    window.showPage = (id, el) => {
        document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        if(el) el.classList.add('active');
    };

    window.toggleSettings = () => {
        const m = document.getElementById('modal');
        m.style.display = (m.style.display === 'block') ? 'none' : 'block';
    };

    onAuthStateChanged(auth, (user) => {
        if (user) {
            onValue(ref(db, `users/${user.uid}`), (s) => {
                const d = s.val();
                document.getElementById('chanName').innerText = d?.name || user.displayName;
                if(d?.avatar) document.getElementById('chanAva').innerHTML = `<img src="${d.avatar}">`;
                if(d?.banner) document.getElementById('chanBanner').src = d.banner;
                
                document.getElementById('newName').value = d?.name || user.displayName;
                document.getElementById('newAva').value = d?.avatar || "";
                document.getElementById('newBanner').value = d?.banner || "";
            });
        } else { signInWithPopup(auth, new GoogleAuthProvider()); }
    });

    window.saveData = () => {
        const u = auth.currentUser;
        if(u) {
            update(ref(db, `users/${u.uid}`), {
                name: document.getElementById('newName').value,
                avatar: document.getElementById('newAva').value,
                banner: document.getElementById('newBanner').value
            }).then(() => toggleSettings());
        }
    };

    window.uploadVideo = () => {
        const t = document.getElementById('vTitle').value, u = document.getElementById('vUrl').value;
        if(t && u) push(ref(db, 'videos'), { title: t, url: u, author: auth.currentUser.displayName, uid: auth.currentUser.uid });
    };

    onValue(ref(db, 'videos'), (snap) => {
        let h = '', m = '';
        snap.forEach(c => {
            const v = c.val();
            const card = `<div class="v-card">
                <iframe src="https://www.youtube.com/embed/${v.url}"></iframe>
                <div style="padding:15px"><b>${v.title}</b><br><small style="color:var(--accent)">@${v.author}</small></div>
            </div>`;
            h += card;
            if(v.uid === auth.currentUser?.uid) m += card;
        });
        document.getElementById('mainFeed').innerHTML = h;
        document.getElementById('myFeed').innerHTML = m;
    });
</script>
</body>
</html>
