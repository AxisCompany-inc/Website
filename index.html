<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Axis AI | Platform</title>
    <style>
        :root { --oa-green: #10a37f; --oa-bg: #0b0d0e; --sidebar: #000000; --card: #171717; }
        body { background: var(--oa-bg); color: #ececf1; font-family: 'Inter', sans-serif; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        .sidebar { width: 260px; background: var(--sidebar); border-right: 1px solid #2d2d2d; display: flex; flex-direction: column; padding: 15px; }
        .nav-item { padding: 12px; margin: 4px 0; border-radius: 8px; cursor: pointer; transition: 0.2s; display: flex; align-items: center; font-size: 0.9rem; }
        .nav-item:hover { background: #2d2d2d; }
        .nav-item.active { background: #212121; border: 1px solid #444; }
        .logo-box { font-weight: bold; color: var(--oa-green); margin-bottom: 30px; padding: 10px; font-size: 1.2rem; }

        main { flex: 1; display: flex; flex-direction: column; overflow-y: auto; position: relative; }
        .content-section { display: none; padding: 40px; width: 100%; max-width: 900px; margin: 0 auto; }
        .content-section.active { display: block; }

        .video-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; margin-top: 20px; }
        .video-card { background: var(--card); border: 1px solid #333; border-radius: 12px; overflow: hidden; }
        .video-container { width: 100%; aspect-ratio: 16/9; background: #000; }
        iframe, video { width: 100%; height: 100%; border: none; }

        .chat-input { background: #212121; border: 1px solid #444; border-radius: 12px; padding: 15px; margin-bottom: 30px; }
        input { background: transparent; border: none; color: white; width: 100%; outline: none; margin-bottom: 10px; font-size: 1rem; }
        .btn { background: var(--oa-green); color: white; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer; float: right; }
        
        .api-key-box { background: #000; border: 1px dashed var(--oa-green); padding: 15px; border-radius: 8px; font-family: monospace; margin-top: 20px; }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="logo-box">AXIS PROJECT</div>
    <div class="nav-item active" onclick="showPage('tube-page', this)">📺 AxisTube</div>
    <div class="nav-item" onclick="showPage('ai-page', this)">🧠 AxisAI</div>
    <div class="nav-item" onclick="showPage('acc-page', this)">⚙️ Account</div>
    <div style="margin-top: auto; padding: 10px; font-size: 0.8rem; color: #888;" id="userTag">Log in to start</div>
</div>

<main>
    <section id="tube-page" class="content-section active">
        <h2>AxisTube Feed</h2>
        <div id="uploadBox" class="chat-input" style="display:none;">
            <input type="text" id="vTitle" placeholder="Название твоего видео...">
            <input type="text" id="vUrl" placeholder="Ссылка на YouTube или прямая ссылка .mp4">
            <button class="btn" id="postBtn">Опубликовать со звуком</button>
            <div style="clear:both"></div>
        </div>
        <div class="video-grid" id="videoFeed"></div>
    </section>

    <section id="ai-page" class="content-section">
        <h1 style="color: var(--oa-green)">AxisAI Vision</h1>
        <div style="background: #171717; padding: 40px; border-radius: 20px; text-align: center; border: 1px solid #333;">
            <h2>Система в разработке</h2>
            <p style="color:#888">Функции AxisAI станут доступны после релиза v2.0</p>
        </div>
    </section>

    <section id="acc-page" class="content-section">
        <h2>Настройки аккаунта</h2>
        <div id="authRequired"><button class="btn" onclick="login()">Login with Google</button></div>
        <div id="accInfo" style="display:none;">
            <p>User: <b id="userName"></b></p>
            <div class="api-key-box"><small>API_KEY:</small><br><span id="apiKey"></span></div>
        </div>
    </section>
</main>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getDatabase, ref, push, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDw6J2bx2-K86qeP_fPVbpwE30iZIAU-Gk",
        authDomain: "axistube-31fee.firebaseapp.com",
        databaseURL: "https://axistube-31fee-default-rtdb.firebaseio.com",
        projectId: "axistube-31fee",
        messagingSenderId: "261441549369",
        appId: "1:261441549369:web:6ee655221cc0078377c9e8"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);
    const provider = new GoogleAuthProvider();

    window.showPage = (pageId, el) => {
        document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
        document.getElementById(pageId).classList.add('active');
        el.classList.add('active');
    };

    window.login = () => signInWithPopup(auth, provider);

    onAuthStateChanged(auth, (user) => {
        if (user) {
            document.getElementById('userTag').innerText = user.displayName;
            document.getElementById('uploadBox').style.display = 'block';
            document.getElementById('authRequired').style.display = 'none';
            document.getElementById('accInfo').style.display = 'block';
            document.getElementById('userName').innerText = user.displayName;
            document.getElementById('apiKey').innerText = "axis_sk_" + btoa(user.uid).substring(0, 16);
        }
    });

    function getEmbedUrl(url) {
        if (url.includes('youtu.be')) return `https://www.youtube.com/embed/${url.split('/').pop().split('?')[0]}`;
        if (url.includes('youtube.com')) return `https://www.youtube.com/embed/${new URLSearchParams(new URL(url).search).get('v')}`;
        return null;
    }

    document.getElementById('postBtn').onclick = () => {
        const t = document.getElementById('vTitle').value;
        const u = document.getElementById('vUrl').value;
        if(t && u) push(ref(db, 'videos'), { title: t, url: u, author: auth.currentUser.displayName });
    };

    onValue(ref(db, 'videos'), (s) => {
        const feed = document.getElementById('videoFeed');
        feed.innerHTML = '';
        s.forEach(child => {
            const v = child.val();
            const embed = getEmbedUrl(v.url);
            const player = embed ? `<iframe src="${embed}" allowfullscreen allow="autoplay; encrypted-media"></iframe>` : `<video src="${v.url}" controls></video>`;
            feed.innerHTML += `<div class="video-card"><div class="video-container">${player}</div><div style="padding:12px"><b>${v.title}</b><br><small>by ${v.author}</small></div></div>`;
        });
    });
</script>
</body>
</html>
