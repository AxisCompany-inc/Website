<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AxisSite | Social Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #10a37f; --bg: #0b0d0e; --card: #171717; }
        body { background: var(--bg); color: #ececf1; font-family: 'Inter', sans-serif; margin: 0; display: flex; height: 100vh; }
        
        .sidebar { width: 260px; background: #000; border-right: 1px solid #333; padding: 20px; display: flex; flex-direction: column; }
        .nav-item { padding: 12px; margin: 4px 0; border-radius: 10px; cursor: pointer; color: #888; display: flex; align-items: center; }
        .nav-item.active { background: #212121; color: var(--accent); border: 1px solid #333; }

        main { flex: 1; overflow-y: auto; padding: 20px; }
        .top-bar { display: flex; gap: 20px; margin-bottom: 25px; align-items: center; }
        #searchInp { flex: 1; padding: 12px; background: #111; border: 1px solid #333; color: #fff; border-radius: 10px; }

        .video-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
        .video-card { background: var(--card); border-radius: 15px; border: 1px solid #333; overflow: hidden; transition: 0.3s; }
        iframe { width: 100%; aspect-ratio: 16/9; border: none; }

        /* Социальные кнопки */
        .video-info { padding: 12px; }
        .author-btn { background: none; border: none; color: var(--accent); font-weight: bold; cursor: pointer; padding: 0; margin-bottom: 8px; }
        .actions { display: flex; gap: 10px; margin-top: 10px; border-top: 1px solid #222; padding-top: 10px; }
        .btn-sm { background: #222; border: 1px solid #333; color: #fff; padding: 5px 10px; border-radius: 6px; cursor: pointer; font-size: 0.8rem; }
        .btn-sm:hover { background: #333; }
        .btn-sub { background: var(--accent); color: #fff; border: none; }

        .content-section { display: none; }
        .content-section.active { display: block; }
    </style>
</head>
<body>

<div class="sidebar">
    <div style="font-weight:bold; font-size:1.5rem; margin-bottom:30px; color:var(--accent)">AxisSite</div>
    <div class="nav-item active" onclick="showPage('home', this)">📺 Лента</div>
    <div class="nav-item" onclick="showPage('shorts-page', this)">📱 Shorts</div>
    <div class="nav-item" onclick="showPage('my-channel', this)">👤 Мой канал</div>
    <div class="nav-item" onclick="showPage('studio', this)">🎨 Загрузить</div>
    <div class="nav-item" id="modTab" onclick="showPage('mod-page', this)" style="display:none;">🛡️ Модерация</div>
</div>

<main>
    <div class="top-bar">
        <input type="text" id="searchInp" placeholder="Поиск видео на AxisSite..." oninput="renderVideos()">
    </div>

    <section id="home" class="content-section active">
        <div class="video-grid" id="videoFeed"></div>
    </section>

    <section id="shorts-page" class="content-section">
        <div class="video-grid" id="shortsFeed" style="grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));"></div>
    </section>

    <section id="my-channel" class="content-section">
        <div style="background:#111; padding:20px; border-radius:15px; border:1px solid #333; margin-bottom:20px;">
            <h2 id="uNameDisplay" style="margin:0">Загрузка...</h2>
            <p id="uSubs">0 подписчиков</p>
        </div>
        <div class="video-grid" id="myVideosFeed"></div>
    </section>

    <section id="studio" class="content-section">
        <div style="background:#111; padding:20px; border-radius:15px;">
            <input type="text" id="vTitle" placeholder="Название..." style="width:100%; padding:10px; margin-bottom:10px; background:#000; border:1px solid #333; color:#fff;">
            <input type="text" id="vUrl" placeholder="Ссылка (YouTube)..." style="width:100%; padding:10px; margin-bottom:10px; background:#000; border:1px solid #333; color:#fff;">
            <button class="btn-sub" style="padding:10px 20px; border-radius:8px; cursor:pointer;" onclick="postVid()">Опубликовать</button>
        </div>
    </section>
</main>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, onAuthStateChanged, GoogleAuthProvider, signInWithPopup } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getDatabase, ref, onValue, push, update, increment } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDw6J2bx2-K86qeP_fPVbpwE30iZIAU-Gk",
        authDomain: "axistube-31fee.firebaseapp.com",
        databaseURL: "https://axistube-31fee-default-rtdb.firebaseio.com",
        projectId: "axistube-31fee",
        appId: "1:261441549369:web:6ee655221cc0078377c9e8"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);

    let allVideos = [];

    onAuthStateChanged(auth, (user) => {
        if (user) {
            document.getElementById('uNameDisplay').innerText = user.displayName;
            update(ref(db, `users/${user.uid}`), { name: user.displayName });
        } else { signInWithPopup(auth, new GoogleAuthProvider()); }
    });

    window.showPage = (id, el) => {
        document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        el.classList.add('active');
    };

    window.postVid = () => {
        const t = document.getElementById('vTitle').value, u = document.getElementById('vUrl').value;
        if(t && u) push(ref(db, 'videos'), { title: t, url: u, author: auth.currentUser.displayName, uid: auth.currentUser.uid, likes: 0 });
    };

    window.likeVid = (id) => {
        update(ref(db, `videos/${id}`), { likes: increment(1) });
    };

    window.renderVideos = () => {
        const query = document.getElementById('searchInp').value.toLowerCase();
        const feeds = { home: '', my: '' };
        
        allVideos.forEach(v => {
            if (v.val.title.toLowerCase().includes(query)) {
                const vidId = v.val.url.includes('v=') ? v.val.url.split('v=')[1] : v.val.url.split('/').pop();
                const card = `
                    <div class="video-card">
                        <iframe src="https://www.youtube.com/embed/${vidId}"></iframe>
                        <div class="video-info">
                            <button class="author-btn">@${v.val.author}</button><br>
                            <b>${v.val.title}</b>
                            <div class="actions">
                                <button class="btn-sm" onclick="likeVid('${v.key}')">❤️ ${v.val.likes || 0}</button>
                                <button class="btn-sm btn-sub">Подписаться</button>
                            </div>
                        </div>
                    </div>`;
                feeds.home += card;
                if(v.val.uid === auth.currentUser?.uid) feeds.my += card;
            }
        });
        document.getElementById('videoFeed').innerHTML = feeds.home;
        document.getElementById('myVideosFeed').innerHTML = feeds.my;
    };

    onValue(ref(db, 'videos'), (snap) => {
        allVideos = [];
        snap.forEach(c => { allVideos.push({key: c.key, val: c.val()}); });
        renderVideos();
    });
</script>
</body>
</html>
