<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Axis Project | Platform</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --oa-green: #10a37f; --oa-bg: #0b0d0e; --card: #171717; }
        body { background: var(--oa-bg); color: #ececf1; font-family: 'Inter', sans-serif; margin: 0; display: flex; height: 100vh; }
        
        .sidebar { width: 260px; background: #000; border-right: 1px solid #333; padding: 20px; display: flex; flex-direction: column; }
        .nav-item { padding: 12px; margin: 4px 0; border-radius: 10px; cursor: pointer; color: #888; display: flex; align-items: center; text-decoration: none; }
        .nav-item.active { background: #212121; color: #fff; border: 1px solid #444; }
        #modTab { border: 1px dashed var(--oa-green); margin-top: 20px; display: none; }

        main { flex: 1; overflow-y: auto; padding: 25px; }
        .content-section { display: none; }
        .content-section.active { display: block; }

        .video-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
        .video-card { background: var(--card); border-radius: 15px; border: 1px solid #333; overflow: hidden; }
        .video-container { position: relative; width: 100%; aspect-ratio: 16/9; }
        iframe { width: 100%; height: 100%; border: none; }

        .btn { padding: 8px 15px; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; margin: 5px; color: white; }
        .btn-red { background: #ff4444; }
        .btn-green { background: var(--oa-green); }
        .user-row { display: flex; justify-content: space-between; align-items: center; padding: 10px; border-bottom: 1px solid #333; }
    </style>
</head>
<body>

<div class="sidebar">
    <div style="color: var(--oa-green); font-weight: bold; margin-bottom: 30px;">AXIS PROJECT</div>
    <div class="nav-item active" onclick="showPage('home', this)">📺 Лента</div>
    <div class="nav-item" onclick="showPage('shorts-page', this)">📱 Shorts</div>
    <div class="nav-item" onclick="showPage('studio', this)">🎨 Загрузить</div>
    <div class="nav-item" id="modTab" onclick="showPage('mod-page', this)">🛡️ Модерация</div>
</div>

<main>
    <section id="home" class="content-section active">
        <h2>Актуальное</h2>
        <div class="video-grid" id="videoFeed"></div>
    </section>

    <section id="shorts-page" class="content-section">
        <h2>Shorts</h2>
        <div class="video-grid" id="shortsFeed" style="grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));"></div>
    </section>

    <section id="studio" class="content-section">
        <h2>Загрузить видео</h2>
        <div style="background: #111; padding: 20px; border-radius: 15px;">
            <input type="text" id="vTitle" placeholder="Название..." style="width: 100%; padding: 10px; margin-bottom: 10px; background: #000; color: #fff; border: 1px solid #333;">
            <input type="text" id="vUrl" placeholder="Ссылка на YouTube..." style="width: 100%; padding: 10px; margin-bottom: 10px; background: #000; color: #fff; border: 1px solid #333;">
            <label><input type="checkbox" id="isShort"> Это вертикальное видео (Shorts)</label><br><br>
            <button class="btn btn-green" onclick="postVideo()">Опубликовать</button>
        </div>
    </section>

    <section id="mod-page" class="content-section">
        <h2>Панель модерации</h2>
        <div style="background: #111; padding: 20px; border-radius: 15px;">
            <h3>Пользователи</h3>
            <div id="userList"></div>
            <h3 style="margin-top: 30px;">Корзина</h3>
            <div id="deletedFeed" class="video-grid"></div>
        </div>
    </section>
</main>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, onAuthStateChanged, GoogleAuthProvider, signInWithPopup } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getDatabase, ref, onValue, update, push, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDw6J2bx2-K86qeP_fPVbpwE30iZIAU-Gk",
        authDomain: "axistube-31fee.firebaseapp.com",
        databaseURL: "https://axistube-31fee-default-rtdb.firebaseio.com",
        projectId: "axistube-31fee",
        appId: "1:261441549369:web:6ee655221cc0078377c9e8"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);
    const ADMIN_UID = "H9JYbowxIXOdQ7Ef3atMDNXXmxf1";

    window.showPage = (id, el) => {
        document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        el.classList.add('active');
    };

    onAuthStateChanged(auth, (user) => {
        if (user) {
            if (user.uid === ADMIN_UID) document.getElementById('modTab').style.display = 'flex';
            update(ref(db, `users/${user.uid}`), { name: user.displayName, uid: user.uid });
        } else {
            signInWithPopup(auth, new GoogleAuthProvider());
        }
    });

    window.postVideo = () => {
        const t = document.getElementById('vTitle').value;
        const u = document.getElementById('vUrl').value;
        const s = document.getElementById('isShort').checked;
        if(t && u) push(ref(db, 'videos'), { title: t, url: u, type: s ? 'short' : 'video', author: auth.currentUser.displayName });
    };

    window.moveTrash = (id, data) => {
        update(ref(db, `trash/${id}`), data);
        remove(ref(db, `videos/${id}`));
    };

    window.restoreVid = (id, data) => {
        update(ref(db, `videos/${id}`), data);
        remove(ref(db, `trash/${id}`));
    };

    onValue(ref(db, 'videos'), (s) => {
        const feed = document.getElementById('videoFeed');
        const sFeed = document.getElementById('shortsFeed');
        feed.innerHTML = ''; sFeed.innerHTML = '';
        s.forEach(child => {
            const v = child.val();
            const id = v.url.includes('v=') ? v.url.split('v=')[1] : v.url.split('/').pop();
            const isAdmin = auth.currentUser?.uid === ADMIN_UID;
            const html = `<div class="video-card">
                <div class="video-container"><iframe src="https://www.youtube.com/embed/${id}"></iframe></div>
                <div style="padding:10px"><b>${v.title}</b><br>
                ${isAdmin ? `<button class="btn btn-red" onclick='moveTrash("${child.key}", ${JSON.stringify(v)})'>Удалить</button>` : ''}
                </div></div>`;
            if (v.type === 'short') sFeed.innerHTML += html; else feed.innerHTML += html;
        });
    });

    onValue(ref(db, 'trash'), (s) => {
        const tFeed = document.getElementById('deletedFeed');
        tFeed.innerHTML = '';
        s.forEach(child => {
            const v = child.val();
            tFeed.innerHTML += `<div class="video-card"><div style="padding:10px"><b>${v.title}</b><br>
                <button class="btn btn-green" onclick='restoreVid("${child.key}", ${JSON.stringify(v)})'>Восстановить</button>
            </div></div>`;
        });
    });

    onValue(ref(db, 'users'), (s) => {
        const uList = document.getElementById('userList');
        uList.innerHTML = '';
        s.forEach(child => {
            const u = child.val();
            if(u.uid === ADMIN_UID) return;
            uList.innerHTML += `<div class="user-row"><span>${u.name}</span>
                <button class="btn btn-red" onclick="update(ref(db, 'users/${u.uid}'), {isBanned: true})">Бан</button>
            </div>`;
        });
    });
</script>
</body>
</html>
