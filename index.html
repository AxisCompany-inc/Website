<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AxisSite | Test</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --oa-green: #10a37f; --oa-bg: #0b0d0e; --card: #171717; }
        body { background: var(--oa-bg); color: #ececf1; font-family: 'Inter', sans-serif; margin: 0; display: flex; height: 100vh; }
        
        .sidebar { width: 260px; background: #000; border-right: 1px solid #333; padding: 20px; display: flex; flex-direction: column; }
        .nav-item { padding: 12px; margin: 4px 0; border-radius: 10px; cursor: pointer; color: #888; display: flex; align-items: center; }
        .nav-item.active { background: #212121; color: #fff; border: 1px solid #444; }

        main { flex: 1; overflow-y: auto; padding: 25px; }
        .content-section { display: none; }
        .content-section.active { display: block; }

        /* Шапка канала */
        .channel-header { background: linear-gradient(180deg, #1a1a1a 0%, #111 100%); padding: 30px; border-radius: 15px; margin-bottom: 25px; border: 1px solid #333; position: relative; }
        .avatar-box { width: 100px; height: 100px; background: var(--oa-green); border-radius: 50%; margin-bottom: 15px; display: flex; align-items: center; justify-content: center; font-size: 2.5rem; border: 4px solid #222; overflow: hidden; }
        .avatar-box img { width: 100%; height: 100%; object-fit: cover; }
        .settings-btn { position: absolute; top: 20px; right: 20px; background: #222; padding: 8px 15px; border-radius: 8px; cursor: pointer; border: 1px solid #444; font-size: 0.8rem; }

        .video-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 15px; }
        .video-card { background: var(--card); border-radius: 12px; border: 1px solid #333; overflow: hidden; padding-bottom: 10px; }
        iframe { width: 100%; aspect-ratio: 16/9; border: none; }

        .btn { padding: 10px 15px; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; color: white; margin: 5px; }
        .btn-green { background: var(--oa-green); }
        .btn-red { background: #ff4444; }
        
        .modal { background: #111; padding: 20px; border-radius: 15px; border: 1px solid #444; margin-bottom: 20px; display: none; }
        input[type="text"] { width: 100%; padding: 10px; background: #000; border: 1px solid #333; color: #fff; border-radius: 8px; margin: 10px 0; }
    </style>
</head>
<body>

<div class="sidebar">
    <div style="color:var(--oa-green); font-weight:bold; font-size:1.4rem; margin-bottom:30px;">AxisSite</div>
    <div class="nav-item active" onclick="showPage('home', this)">📺 Лента</div>
    <div class="nav-item" onclick="showPage('shorts-page', this)">📱 Shorts</div>
    <div class="nav-item" onclick="showPage('my-channel', this)">👤 Мой канал</div>
    <div class="nav-item" onclick="showPage('studio', this)">🎨 Загрузить</div>
    <div class="nav-item" id="modTab" onclick="showPage('mod-page', this)" style="display:none;">🛡️ Модерация</div>
</div>

<main>
    <section id="home" class="content-section active"><h2>Актуальное</h2><div class="video-grid" id="videoFeed"></div></section>
    <section id="shorts-page" class="content-section"><h2>Shorts</h2><div class="video-grid" id="shortsFeed"></div></section>

    <section id="my-channel" class="content-section">
        <div id="settingsModal" class="modal">
            <h3>Настройки профиля</h3>
            <label>Имя канала:</label>
            <input type="text" id="editName" placeholder="Введите имя...">
            <label>Ссылка на аватар (URL):</label>
            <input type="text" id="editAvatar" placeholder="https://...">
            <button class="btn btn-green" onclick="saveSettings()">Сохранить изменения</button>
            <button class="btn" style="background:#333" onclick="toggleSettings()">Отмена</button>
        </div>

        <div class="channel-header">
            <div class="settings-btn" onclick="toggleSettings()">⚙️ Настройки</div>
            <div class="avatar-box" id="userAvatar">👤</div>
            <h2 id="channelName" style="margin:0">Загрузка...</h2>
            <small id="userUID" style="color:#666"></small>
        </div>
        <h3>Ваши публикации</h3>
        <div class="video-grid" id="myVideosFeed"></div>
    </section>

    <section id="studio" class="content-section">
        <h2>Загрузка</h2>
        <div id="uploadForm">
            <input type="text" id="vTitle" placeholder="Название видео..." style="width:95%; padding:12px; margin-bottom:10px; background:#000; color:#fff; border:1px solid #333; border-radius:8px;">
            <input type="text" id="vUrl" placeholder="Ссылка YouTube (v=...)" style="width:95%; padding:12px; margin-bottom:10px; background:#000; color:#fff; border:1px solid #333; border-radius:8px;">
            <label><input type="checkbox" id="isShort"> Это Shorts формат</label><br><br>
            <button class="btn btn-green" style="width:200px" onclick="postVideo()">Опубликовать</button>
        </div>
        <div id="banMessage" style="display:none; color:red; padding:20px;">Вы заблокированы.</div>
    </section>

    <section id="mod-page" class="content-section">
        <h2>Модерация</h2>
        <div style="background:#111; padding:15px; border-radius:15px; border:1px solid #333;">
            <div id="userList"></div>
        </div>
    </section>
</main>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, onAuthStateChanged, GoogleAuthProvider, signInWithPopup } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getDatabase, ref, onValue, push, update, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDw6J2bx2-K86qeP_fPVbpwE30iZIAU-Gk",
        authDomain: "axistube-31fee.firebaseapp.com",
        databaseURL: "https://axistube-31fee-default-rtdb.firebaseio.com",
        projectId: "axistube-31fee",
        appId: "1:261441549369:web:6ee655221cc0078377c9e8"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);
    const ADMIN_UID = "H9JYbowxIXOdQ7Ef3atMDNXXmxf1";

    window.showPage = (id, el) => {
        document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        el.classList.add('active');
    };

    window.toggleSettings = () => {
        const m = document.getElementById('settingsModal');
        m.style.display = (m.style.display === 'block') ? 'none' : 'block';
    };

    window.saveSettings = () => {
        const name = document.getElementById('editName').value;
        const ava = document.getElementById('editAvatar').value;
        if(auth.currentUser) {
            update(ref(db, `users/${auth.currentUser.uid}`), { name: name, avatar: ava });
            toggleSettings();
            alert("Настройки сохранены!");
        }
    };

    onAuthStateChanged(auth, (user) => {
        if (user) {
            document.getElementById('userUID').innerText = "UID: " + user.uid;
            if (user.uid === ADMIN_UID) document.getElementById('modTab').style.display = 'flex';
            
            // Подгружаем данные профиля
            onValue(ref(db, `users/${user.uid}`), (s) => {
                const data = s.val();
                document.getElementById('channelName').innerText = data?.name || user.displayName;
                if(data?.avatar) document.getElementById('userAvatar').innerHTML = `<img src="${data.avatar}">`;
                if(data?.isBanned) {
                    document.getElementById('uploadForm').style.display = 'none';
                    document.getElementById('banMessage').style.display = 'block';
                }
            });
        } else { signInWithPopup(auth, new GoogleAuthProvider()); }
    });

    window.postVideo = () => {
        const t = document.getElementById('vTitle').value, u = document.getElementById('vUrl').value, s = document.getElementById('isShort').checked;
        if(t && u) push(ref(db, 'videos'), { title: t, url: u, type: s ? 'short' : 'video', author: document.getElementById('channelName').innerText, uid: auth.currentUser.uid });
    };

    window.moveTrash = (id, data) => { remove(ref(db, `videos/${id}`)); }; // Упрощенное удаление

    onValue(ref(db, 'videos'), (snapshot) => {
        const feeds = { home: '', shorts: '', my: '' };
        snapshot.forEach(child => {
            const v = child.val();
            const vidId = v.url.includes('v=') ? v.url.split('v=')[1] : v.url.split('/').pop();
            const canDelete = (auth.currentUser?.uid === ADMIN_UID || auth.currentUser?.uid === v.uid);
            
            const card = `<div class="video-card">
                <iframe src="https://www.youtube.com/embed/${vidId}"></iframe>
                <div style="padding:10px"><b>${v.title}</b><br><small>${v.author}</small><br>
                ${canDelete ? `<button class="btn btn-red" style="font-size:0.7rem; padding:5px" onclick='moveTrash("${child.key}")'>Удалить</button>` : ''}
                </div></div>`;

            if (v.type === 'short') feeds.shorts += card; else feeds.home += card;
            if (v.uid === auth.currentUser?.uid) feeds.my += card;
        });
        document.getElementById('videoFeed').innerHTML = feeds.home;
        document.getElementById('shortsFeed').innerHTML = feeds.shorts;
        document.getElementById('myVideosFeed').innerHTML = feeds.my;
    });

    // Список юзеров для админа
    onValue(ref(db, 'users'), (s) => {
        let h = '';
        s.forEach(c => {
            const u = c.val(); if(u.uid === ADMIN_UID) return;
            h += `<div style="display:flex; justify-content:space-between; padding:10px; border-bottom:1px solid #222;">
                <span>${u.name}</span>
                <button class="btn btn-red" onclick="update(ref(db, 'users/${u.uid}'), {isBanned: true})">Бан</button>
            </div>`;
        });
        document.getElementById('userList').innerHTML = h;
    });
</script>
</body>
</html>
