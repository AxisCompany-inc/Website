<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AxisSite | Full Social Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #10a37f; --bg: #0b0d0e; --card: #171717; }
        body { background: var(--bg); color: #ececf1; font-family: 'Inter', sans-serif; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        /* Sidebar */
        .sidebar { width: 260px; background: #000; border-right: 1px solid #333; padding: 20px; display: flex; flex-direction: column; flex-shrink: 0; }
        .nav-item { padding: 12px; margin: 4px 0; border-radius: 10px; cursor: pointer; color: #888; display: flex; align-items: center; transition: 0.2s; }
        .nav-item.active { background: #212121; color: var(--accent); border: 1px solid #333; font-weight: 600; }

        main { flex: 1; overflow-y: auto; display: flex; flex-direction: column; }
        
        /* Top Navigation with Search */
        .top-bar { padding: 15px 25px; background: rgba(11, 13, 14, 0.9); backdrop-filter: blur(10px); sticky; top: 0; z-index: 100; border-bottom: 1px solid #222; }
        #searchInp { width: 100%; max-width: 600px; padding: 12px; background: #1a1a1a; border: 1px solid #333; color: #fff; border-radius: 12px; outline: none; }
        #searchInp:focus { border-color: var(--accent); }

        .content-section { display: none; padding: 25px; animation: fadeIn 0.3s ease; }
        .content-section.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Channel Header */
        .header-container { width: 100%; position: relative; margin-bottom: 40px; }
        .banner { width: 100%; height: 180px; border-radius: 20px; object-fit: cover; background: #222; border: 1px solid #333; }
        .profile-bar { display: flex; align-items: center; gap: 20px; padding: 0 30px; margin-top: -50px; }
        .avatar { width: 100px; height: 100px; border-radius: 50%; border: 6px solid var(--bg); background: var(--accent); overflow: hidden; display: flex; align-items: center; justify-content: center; font-size: 2rem; }
        .avatar img { width: 100%; height: 100%; object-fit: cover; }
        .edit-btn { position: absolute; top: 15px; right: 15px; background: rgba(0,0,0,0.7); color: #fff; border: 1px solid #444; padding: 8px 15px; border-radius: 10px; cursor: pointer; }

        /* Video Grid */
        .video-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
        .shorts-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 15px; }
        .v-card { background: var(--card); border-radius: 15px; border: 1px solid #333; overflow: hidden; }
        iframe { width: 100%; aspect-ratio: 16/9; border: none; display: block; }
        .v-info { padding: 12px; }
        .author-link { color: var(--accent); font-weight: bold; cursor: pointer; font-size: 0.85rem; }
        
        /* Buttons */
        .btn-action { background: #222; border: 1px solid #333; color: #fff; padding: 6px 12px; border-radius: 8px; cursor: pointer; font-size: 0.8rem; margin-top: 8px; }
        .btn-sub { background: var(--accent); border: none; font-weight: 600; margin-left: 5px; }
        .btn-sub.active { background: #333; color: #888; cursor: default; }

        /* Settings Modal */
        .modal { display: none; position: fixed; z-index: 1000; left: 50%; top: 50%; transform: translate(-50%, -50%); background: #161616; padding: 25px; border-radius: 20px; border: 1px solid #333; width: 90%; max-width: 400px; }
        .modal input { width: 100%; padding: 10px; margin: 10px 0; background: #000; border: 1px solid #333; color: #fff; border-radius: 8px; box-sizing: border-box; }
    </style>
</head>
<body>

<div class="sidebar">
    <div style="font-weight:bold; font-size:1.5rem; margin-bottom:30px; color:var(--accent)">AxisSite</div>
    <div class="nav-item active" onclick="showPage('home', this)">📺 Лента</div>
    <div class="nav-item" onclick="showPage('shorts-page', this)">📱 Shorts</div>
    <div class="nav-item" id="nav-chan" onclick="showPage('my-channel', this)">👤 Мой канал</div>
    <div class="nav-item" onclick="showPage('studio', this)">🎨 Загрузить</div>
</div>

<main>
    <div class="top-bar">
        <input type="text" id="searchInp" placeholder="Поиск видео или авторов..." oninput="renderAll()">
    </div>

    <section id="home" class="content-section active">
        <h2>Рекомендации</h2>
        <div class="video-grid" id="mainFeed"></div>
    </section>

    <section id="shorts-page" class="content-section">
        <h2>Shorts</h2>
        <div class="shorts-grid" id="shortsFeed"></div>
    </section>

    <section id="my-channel" class="content-section">
        <div class="header-container">
            <img id="uBanner" src="https://images.unsplash.com/photo-1614850523296-d8c1af93d400?q=80" class="banner">
            <button class="edit-btn" onclick="toggleModal()">⚙️ Настроить вид</button>
            <div class="profile-bar">
                <div class="avatar" id="uAva">👤</div>
                <div>
                    <h1 id="uName" style="margin:0">Creator</h1>
                    <small id="uSubs" style="color:var(--accent)">0 подписчиков</small>
                </div>
            </div>
        </div>
        <h3>Ваш контент</h3>
        <div class="video-grid" id="myFeed"></div>
    </section>

    <section id="studio" class="content-section">
        <div style="background:#111; padding:25px; border-radius:15px; max-width:500px;">
            <h3>Студия Axis</h3>
            <input type="text" id="vTitle" placeholder="Название видео">
            <input type="text" id="vUrl" placeholder="ID YouTube (например: dQw4w9WgXcQ)">
            <label style="font-size:0.8rem; color:#888;"><input type="checkbox" id="isShort"> Это вертикальный Shorts</label>
            <button class="btn-action btn-sub" style="width:100%; margin-top:15px; padding:12px;" onclick="postVideo()">Опубликовать</button>
        </div>
    </section>

    <div id="settingsModal" class="modal">
        <h3>Оформление канала</h3>
        <input type="text" id="setName" placeholder="Имя">
        <input type="text" id="setAva" placeholder="Ссылка на аватарку">
        <input type="text" id="setBanner" placeholder="Ссылка на шапку">
        <button class="btn-action btn-sub" style="width:100%; padding:10px;" onclick="saveSettings()">Сохранить</button>
        <button onclick="toggleModal()" style="background:none; border:none; color:#555; width:100%; margin-top:10px; cursor:pointer;">Закрыть</button>
    </div>
</main>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, onAuthStateChanged, GoogleAuthProvider, signInWithPopup } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getDatabase, ref, onValue, push, update, increment } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDw6J2bx2-K86qeP_fPVbpwE30iZIAU-Gk",
        authDomain: "axistube-31fee.firebaseapp.com",
        databaseURL: "https://axistube-31fee-default-rtdb.firebaseio.com",
        projectId: "axistube-31fee",
        appId: "1:261441549369:web:6ee655221cc0078377c9e8"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);

    let allVids = [], mySubs = [];

    onAuthStateChanged(auth, (user) => {
        if (user) {
            onValue(ref(db, `users/${user.uid}`), (s) => {
                const d = s.val();
                document.getElementById('uName').innerText = d?.name || user.displayName;
                if(d?.avatar) document.getElementById('uAva').innerHTML = `<img src="${d.avatar}">`;
                if(d?.banner) document.getElementById('uBanner').src = d.banner;
                mySubs = d?.subs ? Object.values(d.subs) : [];
                renderAll();
            });
        } else { signInWithPopup(auth, new GoogleAuthProvider()); }
    });

    window.showPage = (id, el) => {
        document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        if(el) el.classList.add('active');
    };

    window.toggleModal = () => {
        const m = document.getElementById('settingsModal');
        m.style.display = (m.style.display === 'block') ? 'none' : 'block';
    };

    window.saveSettings = () => {
        update(ref(db, `users/${auth.currentUser.uid}`), {
            name: document.getElementById('setName').value,
            avatar: document.getElementById('setAva').value,
            banner: document.getElementById('setBanner').value
        }).then(() => toggleModal());
    };

    window.postVideo = () => {
        const t = document.getElementById('vTitle').value, u = document.getElementById('vUrl').value, s = document.getElementById('isShort').checked;
        if(t && u) push(ref(db, 'videos'), { title: t, url: u, type: s ? 'short' : 'video', author: auth.currentUser.displayName, uid: auth.currentUser.uid, likes: 0 });
    };

    window.like = (id) => update(ref(db, `videos/${id}`), { likes: increment(1) });

    window.renderAll = () => {
        const q = document.getElementById('searchInp').value.toLowerCase();
        let h = '', s = '', m = '';
        allVids.forEach(v => {
            if (v.val.title.toLowerCase().includes(q) || v.val.author.toLowerCase().includes(q)) {
                const id = v.val.url.includes('v=') ? v.val.url.split('v=')[1] : v.val.url;
                const isSub = mySubs.includes(v.val.uid);
                const card = `
                <div class="v-card">
                    <iframe src="https://www.youtube.com/embed/${id}"></iframe>
                    <div class="v-info">
                        <span class="author-link" onclick="document.getElementById('searchInp').value='${v.val.author}'; renderAll();">@${v.val.author}</span><br>
                        <b>${v.val.title}</b><br>
                        <button class="btn-action" onclick="like('${v.key}')">❤️ ${v.val.likes || 0}</button>
                        <button class="btn-action btn-sub ${isSub ? 'active' : ''}" onclick="push(ref(db, 'users/${auth.currentUser.uid}/subs'), '${v.val.uid}')">
                            ${isSub ? 'Вы подписаны' : 'Подписаться'}
                        </button>
                    </div>
                </div>`;
                if(v.val.type === 'short') s += card; else h += card;
                if(v.val.uid === auth.currentUser?.uid) m += card;
            }
        });
        document.getElementById('mainFeed').innerHTML = h;
        document.getElementById('shortsFeed').innerHTML = s;
        document.getElementById('myFeed').innerHTML = m;
    };

    onValue(ref(db, 'videos'), (snap) => {
        allVids = [];
        snap.forEach(c => { allVids.push({key: c.key, val: c.val()}); });
        renderAll();
    });
</script>
</body>
</html>
