<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AxisCompany inc</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #ffffff;
            --text: #000000;
            --accent-grad: linear-gradient(90deg, #000000, #666666, #000000);
            --sidebar-bg: #f9f9f9;
            --border: #e5e5e5;
        }

        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            display: flex;
            height: 100vh;
            background-color: var(--bg);
            color: var(--text);
        }

        /* Левое меню (Сайдбар) */
        .sidebar {
            width: 280px;
            background: var(--sidebar-bg);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            padding: 24px;
            box-sizing: border-box;
        }

        .brand {
            font-weight: 700;
            font-size: 1.1rem;
            margin-bottom: 8px;
        }

        .menu-label {
            font-size: 0.9rem;
            color: #888;
            margin-bottom: 32px;
        }

        .tabs-header {
            font-weight: 600;
            text-transform: lowercase;
            margin-bottom: 16px;
            font-size: 1.2rem;
        }

        .nav-item {
            padding: 10px 0;
            cursor: pointer;
            font-size: 1rem;
            color: #333;
            transition: color 0.2s;
            text-decoration: none;
            display: block;
        }

        .nav-item:hover {
            color: #000;
            font-weight: 600;
        }

        .under-dev {
            font-size: 0.8rem;
            color: #999;
            display: block;
            margin-top: 4px;
        }

        /* Основной контент */
        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 40px;
        }

        .main-header {
            font-size: 1.5rem;
            margin-bottom: 8px;
            font-weight: 400;
        }

        .sub-header {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 60px;
        }

        /* Тот самый градиент из наброска */
        .gradient-title {
            font-size: 6rem;
            font-weight: 800;
            line-height: 1.1;
            background: var(--accent-grad);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: moveGrad 5s linear infinite;
        }

        @keyframes moveGrad {
            to { background-position: 200% center; }
        }

        @media (max-width: 768px) {
            .gradient-title { font-size: 3rem; }
            .sidebar { width: 200px; }
        }
    </style>
</head>
<body>

    <aside class="sidebar">
        <div class="brand">AxisCompany inc</div>
        <div class="menu-label">Меню</div>

        <div class="tabs-header">вкладки</div>
        <nav>
            <a href="#" class="nav-item">Настройки</a>
            <a href="#" class="nav-item">Аккаунт</a>
            <a href="#" class="nav-item">Новости</a>
            <a href="#" class="nav-item">
                AxisAI 
                <span class="under-dev">(Under development)</span>
            </a>
        </nav>
    </aside>

    <main>
        <div class="main-header">Главное меню</div>
        <div class="sub-header">AxisCompany inc</div>
        
        <div class="gradient-title">
            Градиент в<br>меню
        </div>
    </main>

</body>
</html>
